<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8"/>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map{
        height:100vh;
        width:100%;
        }
    </style>

</head>

<body>

<div id="map"></div>

<script>

    var map = L.map('map').setView([-22.252, -45.703], 13);

    L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
    maxZoom:19
    }).addTo(map);

</script>

</body>
</html>
